<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Blog - Portal33</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tendencias y oportunidades inmobiliarias en Bogotá norte. Artículos y análisis del mercado inmobiliario por Portal33.">
  <meta property="og:title" content="Blog - Portal33">
  <meta property="og:description" content="Tendencias y oportunidades inmobiliarias en la zona norte de Bogotá.">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="blog.css">
</head>

<body>

  <!-- HEADER cargado dinámicamente desde modules/header.html -->
  <div id="header-container"></div>

  <!-- =======================================
       CONTENIDO PRINCIPAL
  ======================================= -->
  <main class="blog-container">
    <div class="container">
      <h1 class="blog-title">Tendencias y Oportunidades Inmobiliarias</h1>
    </div>

    <!-- INDICADOR DE CARGA -->
    <div id="loadingBlogs" class="loading-box" role="status" aria-live="polite">
      <h2>Cargando Blogs…</h2>
    </div>

    <!-- TABLA DE ARTÍCULOS -->
    <div class="container">
      <table id="blogTable">
        <thead>
          <tr>
            <th>Blog</th>
            <th>Fecha</th>
            <th>Resumen</th>
            <th>Leer Más</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <!-- FOOTER cargado dinámicamente desde modules/footer.html -->
  <div id="footer-container"></div>

  <!-- =======================================
       SCRIPTS
       Orden requerido:
       1. header-loader  → inyecta HTML del header
       2. header.js      → enlace activo + submódulos
       3. footer-loader  → inyecta HTML del footer
       4. menu-mobile    → menú responsive
       5. blog.js        → carga y renderiza artículos
  ======================================= -->
  <script src="js/header-loader.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer-loader.js"></script>
  <script src="js/menu-mobile.js"></script>
  <script src="js/blog.js"></script>

</body>
</html>
